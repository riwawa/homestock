services:
  postgres:
    image: postgres:16
    container_name: homestock-postgres
    environment:
      POSTGRES_DB: homestock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homestock"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: homestock-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
